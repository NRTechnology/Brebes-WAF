#
# =============================================================================
# BREBES-WAF
# Category  : WebShell
# Signature : Alfa WebShell
# Function  : Edit File
# Version   : 1.0
# Author    : Brebes CSIRT
# Rule ID   : 2002012
#
# Description:
# Detects Alfa WebShell Edit File operation.
#
# Required Parameters:
#   a      = FilesTools (Base64)
#   alfa1  = Filename (Base64)
#   alfa2  = edit (Base64)
#   alfa3  = File Content (Base64)
#   ajax   = True (Base64)
# =============================================================================
#

SecRule ARGS:a "@streq RmlsZXNUb29scw==" \
"id:2002012,\
rev:'1',\
ver:'BREBES-WAF/1.0',\
phase:2,\
deny,\
status:403,\
log,\
auditlog,\
severity:'CRITICAL',\
accuracy:'10',\
maturity:'10',\
tag:'brebes-waf',\
tag:'webshell',\
tag:'alfa',\
tag:'edit-file',\
logdata:'file=%{ARGS.alfa1}',\
msg:'BREBES-WAF | Alfa | Edit File | Detected Alfa WebShell Edit File',\
chain"

    SecRule ARGS:alfa1 "@rx .+" \
    "chain"

        SecRule ARGS:alfa2 "@streq ZWRpdA==" \
        "chain"

            SecRule ARGS:alfa3 "@rx .+" \
            "chain"

                SecRule ARGS:ajax "@streq dHJ1ZQ=="
