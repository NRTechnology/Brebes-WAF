#
# =============================================================================
# BREBES-WAF
# Category  : WebShell
# Signature : Alfa WebShell Tesla 4.1
# Function  : SQL Dumper
# Version   : 1.0
# Author    : Brebes CSIRT
# Rule ID   : 2002015
#
# Description:
# Detects Alfa WebShell SQL Database Dump operation.
#
# Required Parameters:
#   a       = dumper (Base64)
#   c       = Working Directory (Base64)
#   alfa3   = Database Username (Base64)
#   alfa4   = Database Password (Base64)
#   alfa5   = Database Name (Base64)
#   alfa6   = Dump Output File (Base64)
#   alfa7   = Database Host (Base64)
#   ajax    = True (Base64)
# =============================================================================
#

SecRule ARGS:a "@streq ZHVtcGVy" \
"id:2002015,\
rev:'1',\
ver:'BREBES-WAF/1.0',\
phase:2,\
deny,\
status:403,\
log,\
auditlog,\
severity:'CRITICAL',\
accuracy:'10',\
maturity:'10',\
tag:'brebes-waf',\
tag:'webshell',\
tag:'alfa',\
tag:'sql',\
tag:'database-dump',\
logdata:'db=%{ARGS.alfa5}, output=%{ARGS.alfa6}',\
msg:'BREBES-WAF | Alfa | SQL Dumper | Detected Alfa WebShell Database Dump',\
chain"

    SecRule ARGS:c "@rx .+" \
    "chain"

        SecRule ARGS:alfa3 "@rx .+" \
        "chain"

            SecRule ARGS:alfa4 "@rx .*" \
            "chain"

                SecRule ARGS:alfa5 "@rx .+" \
                "chain"

                    SecRule ARGS:alfa6 "@rx .+" \
                    "chain"

                        SecRule ARGS:alfa7 "@rx .+" \
                        "chain"

                            SecRule ARGS:ajax "@streq dHJ1ZQ=="
