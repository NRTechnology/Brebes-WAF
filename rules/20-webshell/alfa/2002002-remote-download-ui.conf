# =============================================================================
# BREBES-WAF
# Category  : WebShell
# Signature : Alfa WebShell Tesla 4.1
# Function  : Remote Download (Menu Access)
# Version   : 1.0
# Author    : Brebes CSIRT
# Rule ID   : 2002002
#
# Description:
# Blocks access to the Alfa WebShell Remote Download feature as soon as
# the menu is opened.
# =============================================================================
#

SecRule ARGS:a "@streq cmVtb3RlZGw=" \
"id:2002002,\
rev:'1',\
ver:'BREBES-WAF/1.0',\
phase:2,\
deny,\
status:403,\
log,\
auditlog,\
t:none,\
severity:'CRITICAL',\
accuracy:'10',\
maturity:'10',\
tag:'brebes-waf',\
tag:'webshell',\
tag:'alfa',\
tag:'remote-download',\
logdata:'Matched %{MATCHED_VAR_NAME}=%{MATCHED_VAR}',\
msg:'BREBES-WAF | Alfa | Remote Download | Detected a remote download attempt using Alfa WebShell'"