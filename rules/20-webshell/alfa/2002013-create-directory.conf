#
# =============================================================================
# BREBES-WAF
# Category  : WebShell
# Signature : Alfa WebShell Tesla 4.1
# Function  : Create Directory
# Version   : 1.0
# Author    : Brebes CSIRT
# Rule ID   : 2002013
#
# Description:
# Detects Alfa WebShell Create Directory (mkdir) operation.
#
# Required Parameters:
#   a      = FilesMan (Base64)
#   c      = Current Directory (Base64)
#   alfa1  = mkdir (Base64)
#   alfa2  = Directory Name
#   ajax   = True (Base64)
# =============================================================================
#

SecRule ARGS:a "@streq RmlsZXNNYW4=" \
"id:2002013,\
rev:'1',\
ver:'BREBES-WAF/1.0',\
phase:2,\
deny,\
status:403,\
log,\
auditlog,\
severity:'CRITICAL',\
accuracy:'10',\
maturity:'10',\
tag:'brebes-waf',\
tag:'webshell',\
tag:'alfa',\
tag:'create-directory',\
logdata:'dir=%{ARGS.c}, name=%{ARGS.alfa2}',\
msg:'BREBES-WAF | Alfa | Create Directory | Detected Alfa WebShell Create Directory',\
chain"

    SecRule ARGS:alfa1 "@streq bWtkaXI=" \
    "chain"

        SecRule ARGS:alfa2 "@rx .+" \
        "chain"

            SecRule ARGS:ajax "@streq dHJ1ZQ=="
