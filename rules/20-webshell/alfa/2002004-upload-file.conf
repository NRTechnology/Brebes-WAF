# =============================================================================
# BREBES-WAF
# Category  : WebShell
# Signature : Alfa WebShell
# Function  : Upload File
# Version   : 1.0
# Author    : Brebes CSIRT
# Rule ID   : 2003004
#
# Description:
# Detects and blocks the Alfa WebShell Upload File feature.
#
# Required Parameters:
#   a              = FilesMAn (Base64)
#   alfa1          = uploadFile (Base64)
#   FILES_NAMES:f[] = f[]
# =============================================================================

SecRule ARGS:a "@streq RmlsZXNNQW4=" \
"id:2003004,\
rev:'1',\
ver:'BREBES-WAF/1.0',\
phase:2,\
deny,\
status:403,\
log,\
auditlog,\
severity:'CRITICAL',\
accuracy:'10',\
maturity:'10',\
tag:'brebes-waf',\
tag:'webshell',\
tag:'alfa',\
tag:'upload-file',\
logdata:'a=%{ARGS.a}, alfa1=%{ARGS.alfa1}',\
msg:'BREBES-WAF | Alfa | Upload File | Detected Alfa WebShell Upload File',\
chain"

    SecRule ARGS:alfa1 "@streq dXBsb2FkRmlsZQ==" \
    "chain"

        SecRule FILES_NAMES:f[] "@streq f[]"
