#
# =============================================================================
# BREBES-WAF
# Category  : WebShell
# Signature : Alfa WebShell Tesla 4.1
# Function  : Change Permission (chmod)
# Version   : 1.0
# Author    : Brebes CSIRT
# Rule ID   : 2002007
#
# Description:
# Detects Alfa WebShell Change Permission (chmod) operation.
#
# Required Parameters:
#   a      = FilesTools (Base64)
#   alfa1  = Filename (Base64)
#   alfa2  = chmod (Base64)
#   alfa3  = Permission (Base64)
#   ajax   = True (Base64)
# =============================================================================
#

SecRule ARGS:a "@streq RmlsZXNUb29scw==" \
"id:2002007,\
rev:'1',\
ver:'BREBES-WAF/1.0',\
phase:2,\
deny,\
status:403,\
log,\
auditlog,\
severity:'CRITICAL',\
accuracy:'10',\
maturity:'10',\
tag:'brebes-waf',\
tag:'webshell',\
tag:'alfa',\
tag:'chmod',\
logdata:'file=%{ARGS.alfa1}, perm=%{ARGS.alfa3}',\
msg:'BREBES-WAF | Alfa | Change Permission | Detected Alfa WebShell chmod operation',\
chain"

    SecRule ARGS:alfa1 "@rx .+" \
    "chain"

        SecRule ARGS:alfa2 "@streq Y2htb2Q=" \
        "chain"

            SecRule ARGS:alfa3 "@rx .+" \
            "chain"

                SecRule ARGS:ajax "@streq dHJ1ZQ=="
