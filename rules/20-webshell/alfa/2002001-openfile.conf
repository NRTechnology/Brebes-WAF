#
# =============================================================================
# BREBES-WAF
# Category  : WebShell
# Signature : Alfa WebShell
# Function  : Open File
# Version   : 1.0
# Author    : Brebes CSIRT
# Rule ID   : 2002001
#
# Description:
# Detects Alfa WebShell Open File execution.
#
# Required Parameters:
#   a      = remotedl (Base64)
#   alfa1  = Filename (Base64)
