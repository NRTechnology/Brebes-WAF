SecRule ARGS:a "@streq RmlsZXNUb29scw==" \
"id:2002001,\
rev:'1',\
ver:'BREBES-WAF/1.0',\
phase:2,\
deny,\
status:403,\
log,\
auditlog,\
severity:'CRITICAL',\
accuracy:'10',\
maturity:'10',\
tag:'brebes-waf',\
tag:'webshell',\
tag:'alfa',\
tag:'open-file',\
logdata:'Matched %{MATCHED_VAR_NAME}=%{MATCHED_VAR}',\
msg:'BREBES-WAF | Alfa | Open File | Detected Alfa WebShell Open File',\
chain"

    SecRule ARGS:alfa1 "!@streq "
