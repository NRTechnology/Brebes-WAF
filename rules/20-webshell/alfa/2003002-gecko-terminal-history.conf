#
# =============================================================================
# BREBES-WAF
# Category  : WebShell
# Signature : Gecko File Manager
# Function  : Terminal History Cookie Detection
# Version   : 1.0
# Author    : Brebes CSIRT
# Rule ID   : 2003002
#
# Description:
# Detects the Gecko File Manager terminal history cookie
# used to store previously executed terminal commands.
#
# Required Parameters:
#   Cookie Name = alfa-terminal-history
# =============================================================================

SecRule REQUEST_COOKIES_NAMES "@streq alfa-terminal-history" \
"id:2003002,\
rev:'1',\
ver:'BREBES-WAF/1.0',\
phase:1,\
deny,\
status:403,\
log,\
auditlog,\
severity:'CRITICAL',\
accuracy:'10',\
maturity:'10',\
tag:'brebes-waf',\
tag:'webshell',\
tag:'gecko',\
tag:'cookie',\
tag:'terminal-history',\
logdata:'Matched %{MATCHED_VAR_NAME}=%{MATCHED_VAR}',\
msg:'BREBES-WAF | Gecko File Manager | Terminal History Cookie Detected'"
