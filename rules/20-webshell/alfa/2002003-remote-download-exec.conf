#
# =============================================================================
# BREBES-WAF
# Category  : WebShell
# Signature : Alfa WebShell Tesla 4.1
# Function  : Remote Download (Execution)
# Version   : 1.0
# Author    : Brebes CSIRT
# Rule ID   : 2002003
#
# Description:
# Detects Alfa WebShell Remote Download execution.
#
# Required Parameters:
#   a      = remotedl (Base64)
#   alfa1  = Source URL (Base64)
#   alfa2  = Destination Path (Base64)
# =============================================================================
#
SecRule REQUEST_BODY "@rx ^(?=.*(?:^|[&;])a=cmVtb3RlZGw=(?:[&;]|$))(?=.*(?:^|[&;])alfa1=[^&;]{1,})(?=.*(?:^|[&;])alfa2=[^&;]{1,})" \
"id:2002003,\
rev:'1',\
ver:'BREBES-WAF/1.0',\
phase:2,\
deny,\
status:403,\
log,\
auditlog,\
t:none,\
severity:'CRITICAL',\
accuracy:'10',\
maturity:'10',\
tag:'brebes-waf',\
tag:'webshell',\
tag:'alfa',\
tag:'remote-download',\
logdata:'Matched %{MATCHED_VAR_NAME}=%{MATCHED_VAR}',\
msg:'BREBES-WAF | Alfa | Remote Download | Detected a remote download attempt using Alfa WebShell'"