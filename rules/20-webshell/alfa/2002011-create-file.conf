#
# =============================================================================
# BREBES-WAF
# Category  : WebShell
# Signature : Alfa WebShell
# Function  : File Manager
# Version   : 1.0
# Author    : Brebes CSIRT
# Rule ID   : 2002011
#
# Description:
# Detects Alfa WebShell Create File access.
#
# Required Parameters:
#   a     = FilesMan (Base64)
#   c     = Current Directory (Base64)
#   ajax  = True (Base64)
# =============================================================================
#

SecRule ARGS:a "@streq RmlsZXNNYW4=" \
"id:2002011,\
rev:'1',\
ver:'BREBES-WAF/1.0',\
phase:2,\
deny,\
status:403,\
log,\
auditlog,\
severity:'CRITICAL',\
accuracy:'10',\
maturity:'10',\
tag:'brebes-waf',\
tag:'webshell',\
tag:'alfa',\
tag:'file-manager',\
logdata:'dir=%{ARGS.c}',\
msg:'BREBES-WAF | Alfa | File Manager | Detected Alfa WebShell File Manager Access',\
chain"

    SecRule ARGS:c "@rx .+" \
    "chain"

        SecRule ARGS:ajax "@streq dHJ1ZQ=="
