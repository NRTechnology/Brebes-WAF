#
# =============================================================================
# BREBES-WAF
# Category  : WebShell
# Signature : Alfa WebShell
# Function  : Terminal Command Execution
# Version   : 1.0
# Author    : Brebes CSIRT
# Rule ID   : 2002008
#
# Description:
# Detects Alfa WebShell Terminal Command execution.
#
# Required Parameters:
#   a      = terminalExec (Base64)
#   c      = Working Directory (Base64)
#   alfa1  = Command (Base64)
#   ajax   = True (Base64)
# =============================================================================
#

SecRule ARGS:a "@streq dGVybWluYWxFeGVj" \
"id:2002008,\
rev:'1',\
ver:'BREBES-WAF/1.0',\
phase:2,\
deny,\
status:403,\
log,\
auditlog,\
severity:'CRITICAL',\
accuracy:'10',\
maturity:'10',\
tag:'brebes-waf',\
tag:'webshell',\
tag:'alfa',\
tag:'terminal',\
tag:'command-execution',\
logdata:'cwd=%{ARGS.c}, cmd=%{ARGS.alfa1}',\
msg:'BREBES-WAF | Alfa | Terminal | Detected Alfa WebShell Terminal Command Execution',\
chain"

    SecRule ARGS:c "@rx .+" \
    "chain"

        SecRule ARGS:alfa1 "@rx .+" \
        "chain"

            SecRule ARGS:ajax "@streq dHJ1ZQ=="
            