#
# =============================================================================
# BREBES-WAF
# Category  : WebShell
# Signature : Gecko File Manager
# Function  : Temporary Directory Cookie Detection
# Version   : 1.0
# Author    : Brebes CSIRT
# Rule ID   : 2003003
#
# Description:
# Detects the Gecko File Manager temporary directory cookie
# used to store the current working directory for file
# operations and command execution.
#
# Required Parameters:
#   Cookie Name = eval_tmpdir
# =============================================================================

SecRule REQUEST_COOKIES_NAMES "@streq eval_tmpdir" \
"id:2003003,\
rev:'1',\
ver:'BREBES-WAF/1.0',\
phase:1,\
deny,\
status:403,\
log,\
auditlog,\
severity:'CRITICAL',\
accuracy:'10',\
maturity:'10',\
tag:'brebes-waf',\
tag:'webshell',\
tag:'gecko',\
tag:'cookie',\
tag:'temporary-directory',\
logdata:'Matched %{MATCHED_VAR_NAME}=%{MATCHED_VAR}',\
msg:'BREBES-WAF | Gecko File Manager | Temporary Directory Cookie Detected'"
