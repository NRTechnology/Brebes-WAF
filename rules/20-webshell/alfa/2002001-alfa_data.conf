#
# =============================================================================
# BREBES-WAF
# Category  : WebShell
# Signature : Alfa WebShell Tesla 4.x
# Function  : ALFA_DATA Directory Access
# Version   : 1.0
# Author    : Brebes CSIRT
# Rule ID   : 2001001
#
# Description:
# Detects requests attempting to access the ALFA_DATA directory
# used internally by Alfa WebShell Tesla.
#
# Required Parameters:
#   REQUEST_URI
# =============================================================================

SecRule REQUEST_URI "@contains /ALFA_DATA/" \
"id:2001001,\
rev:'1',\
ver:'BREBES-WAF/1.0',\
phase:1,\
deny,\
status:403,\
log,\
auditlog,\
severity:'CRITICAL',\
accuracy:'10',\
maturity:'10',\
tag:'brebes-waf',\
tag:'webshell',\
tag:'alfa',\
tag:'alfa-data',\
logdata:'Matched %{MATCHED_VAR_NAME}=%{MATCHED_VAR}',\
msg:'BREBES-WAF | Alfa | ALFA_DATA Directory Access Detected'"
