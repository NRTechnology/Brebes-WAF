#
# =============================================================================
# BREBES-WAF
# Category  : WebShell
# Signature : Alfa WebShell Tesla 4.1
# Function  : View /etc/passwd
# Version   : 1.0
# Author    : Brebes CSIRT
# Rule ID   : 2002014
#
# Description:
# Detects Alfa WebShell attempting to read /etc/passwd.
#
# Required Parameters:
#   a      = FilesTools (Base64)
#   c      = //etc/ (Base64)
#   alfa1  = passwd (Base64)
#   alfa2  = view (Base64)
#   ajax   = True (Base64)
# =============================================================================
#

SecRule ARGS:a "@streq RmlsZXNUb29scw==" \
"id:2002014,\
rev:'1',\
ver:'BREBES-WAF/1.0',\
phase:2,\
deny,\
status:403,\
log,\
auditlog,\
severity:'CRITICAL',\
accuracy:'10',\
maturity:'10',\
tag:'brebes-waf',\
tag:'webshell',\
tag:'alfa',\
tag:'view-file',\
tag:'etc-passwd',\
logdata:'dir=%{ARGS.c}, file=%{ARGS.alfa1}',\
msg:'BREBES-WAF | Alfa | View File | Detected attempt to read /etc/passwd',\
chain"

    SecRule ARGS:c "@streq Ly9ldGMv" \
    "chain"

        SecRule ARGS:alfa1 "@streq cGFzc3dk" \
        "chain"

            SecRule ARGS:alfa2 "@streq dmlldw==" \
            "chain"

                SecRule ARGS:ajax "@streq dHJ1ZQ=="
