#
# =============================================================================
# BREBES-WAF
# Category  : WebShell
# Signature : Alfa WebShell Tesla 4.1
# Function  : SQL Database Connection
# Version   : 1.0
# Author    : Brebes CSIRT
# Rule ID   : 2002010
#
# Description:
# Detects Alfa WebShell SQL Database Connection.
#
# Required Parameters:
#   a          = Sql (Base64)
#   alfa1      = query (Base64)
#   type       = Database Type (Base64)
#   sql_host   = Database Host (Base64)
#   sql_login  = Username (Base64)
#   sql_pass   = Password (Base64)
#   sql_base   = Database Name (Base64)
#   ajax       = True (Base64)
# =============================================================================
#

SecRule ARGS:a "@streq U3Fs" \
"id:2002010,\
rev:'1',\
ver:'BREBES-WAF/1.0',\
phase:2,\
deny,\
status:403,\
log,\
auditlog,\
severity:'CRITICAL',\
accuracy:'10',\
maturity:'10',\
tag:'brebes-waf',\
tag:'webshell',\
tag:'alfa',\
tag:'sql',\
tag:'database-connection',\
logdata:'db=%{ARGS.sql_base}, host=%{ARGS.sql_host}, user=%{ARGS.sql_login}',\
msg:'BREBES-WAF | Alfa | SQL | Detected Alfa WebShell Database Connection',\
chain"

    SecRule ARGS:alfa1 "@streq cXVlcnk=" \
    "chain"

        SecRule ARGS:type "@rx .+" \
        "chain"

            SecRule ARGS:sql_host "@rx .+" \
            "chain"

                SecRule ARGS:sql_login "@rx .+" \
                "chain"

                    SecRule ARGS:sql_pass "@rx .*" \
                    "chain"

                        SecRule ARGS:sql_base "@rx .+" \
                        "chain"

                            SecRule ARGS:ajax "@streq dHJ1ZQ=="
