#
# =============================================================================
# BREBES-WAF
# Category  : WebShell
# Signature : Alfa WebShell
# Function  : Fingerprint
# Version   : 1.0
# Author    : Brebes CSIRT
# Rule ID   : 2002000
#
# Description:
# Detects Alfa WebShell fingerprint and initialization requests.
#
# Required Parameters:
#   a = get_flags | checkupdate | updateheader (Base64)
# =============================================================================

SecRule ARGS:a "@rx ^(Z2V0X2ZsYWdz|Y2hlY2t1cGRhdGU=|dXBkYXRlaGVhZGVy)$" \
"id:2002000,\
rev:'1',\
ver:'BREBES-WAF/1.0',\
phase:2,\
deny,\
status:403,\
log,\
auditlog,\
severity:'CRITICAL',\
accuracy:'10',\
maturity:'10',\
tag:'brebes-waf',\
tag:'webshell',\
tag:'alfa',\
tag:'fingerprint',\
logdata:'Matched %{MATCHED_VAR_NAME}=%{MATCHED_VAR}',\
msg:'BREBES-WAF | Alfa | Fingerprint | Detected Alfa WebShell Fingerprint Request', \
chain"

    SecRule ARGS:c "@rx .+" \
    "chain"

        SecRule ARGS:ajax "@streq dHJ1ZQ=="
