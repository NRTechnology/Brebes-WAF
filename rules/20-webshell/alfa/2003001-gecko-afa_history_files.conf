#
# =============================================================================
# BREBES-WAF
# Category  : WebShell
# Signature : Gecko File Manager
# Function  : History Cookie Detection
# Version   : 1.0
# Author    : Brebes CSIRT
# Rule ID   : 2003001
#
# Description:
# Detects the Gecko File Manager history cookie used to
# store recently accessed files.
#
# Required Parameters:
#   Cookie Name = alfa_history_files
# =============================================================================

SecRule REQUEST_COOKIES_NAMES "@streq alfa_history_files" \
"id:2003001,\
rev:'1',\
ver:'BREBES-WAF/1.0',\
phase:1,\
deny,\
status:403,\
log,\
auditlog,\
severity:'CRITICAL',\
accuracy:'10',\
maturity:'10',\
tag:'brebes-waf',\
tag:'webshell',\
tag:'gecko',\
tag:'cookie',\
tag:'history-files',\
logdata:'Matched %{MATCHED_VAR_NAME}=%{MATCHED_VAR}',\
msg:'BREBES-WAF | Gecko File Manager | History Cookie Detected'"
