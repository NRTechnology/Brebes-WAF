#
# =============================================================================
# BREBES-WAF
# Category  : WebShell
# Signature : Alfa WebShell
# Function  : Delete File
# Version   : 1.0
# Author    : Brebes CSIRT
# Rule ID   : 2002005
#
# Description:
# Detects Alfa WebShell Delete File operation.
#
# Required Parameters:
#   a      = FilesMan (Base64)
#   alfa1  = delete (Base64)
#   alfa2  = Filename (Base64)
#   ajax   = True (Base64)
# =============================================================================
#

SecRule ARGS:a "@streq RmlsZXNNYW4=" \
"id:2002005,\
rev:'1',\
ver:'BREBES-WAF/1.0',\
phase:2,\
deny,\
status:403,\
log,\
auditlog,\
severity:'CRITICAL',\
accuracy:'10',\
maturity:'10',\
tag:'brebes-waf',\
tag:'webshell',\
tag:'alfa',\
tag:'delete-file',\
logdata:'file=%{ARGS.alfa2}',\
msg:'BREBES-WAF | Alfa | Delete File | Detected Alfa WebShell Delete File',\
chain"

    SecRule ARGS:alfa1 "@streq ZGVsZXRl" \
    "chain"

        SecRule ARGS:alfa2 "@rx .+" \
        "chain"

            SecRule ARGS:ajax "@streq dHJ1ZQ=="
            