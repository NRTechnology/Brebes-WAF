#
# =============================================================================
# BREBES-WAF
# Category  : Whitelist
# Function  : Allowed File Upload MIME Types
# Version   : 1.0
# Author    : Brebes CSIRT
# Rule ID   : 1001002
#
# Description:
# Allows uploads of common image, document, spreadsheet,
# presentation, and text MIME types.
#
# Required Parameters:
#   FILES = MIME Type
#
# Allowed MIME Types:
#   Images:
#     - image/png
#     - image/jpeg
#     - image/webp
#
#   Documents:
#     - application/pdf
#     - text/plain
#     - application/rtf
#     - application/msword
#     - application/vnd.openxmlformats-officedocument.wordprocessingml.document
#     - application/vnd.oasis.opendocument.text
#
#   Spreadsheets:
#     - application/vnd.ms-excel
#     - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
#     - text/csv
#     - application/vnd.oasis.opendocument.spreadsheet
#
#   Presentations:
#     - application/vnd.ms-powerpoint
#     - application/vnd.openxmlformats-officedocument.presentationml.presentation
#     - application/vnd.oasis.opendocument.presentation
# =============================================================================
#

SecRule FILES "@rx ^(?:\
image/(?:png|jpeg|webp)|\
application/pdf|\
text/plain|\
application/rtf|\
application/msword|\
application/vnd\.openxmlformats-officedocument\.wordprocessingml\.document|\
application/vnd\.oasis\.opendocument\.text|\
application/vnd\.ms-excel|\
application/vnd\.openxmlformats-officedocument\.spreadsheetml\.sheet|\
text/csv|\
application/vnd\.oasis\.opendocument\.spreadsheet|\
application/vnd\.ms-powerpoint|\
application/vnd\.openxmlformats-officedocument\.presentationml\.presentation|\
application/vnd\.oasis\.opendocument\.presentation\
)$" \
"id:1001002,\
rev:'1',\
ver:'BREBES-WAF/1.0',\
phase:2,\
pass,\
log,\
auditlog,\
severity:'NOTICE',\
accuracy:'10',\
maturity:'10',\
tag:'brebes-waf',\
tag:'whitelist',\
tag:'upload',\
tag:'allowed-mimetype',\
logdata:'Matched %{MATCHED_VAR_NAME}=%{MATCHED_VAR}',\
msg:'BREBES-WAF | Whitelist | Allowed File Upload MIME Type'"
