#
# =============================================================================
# BREBES-WAF
# Category  : Whitelist
# Function  : Allowed File Upload Extensions
# Version   : 1.0
# Author    : Brebes CSIRT
# Rule ID   : 1001001
#
# Description:
# Detects uploaded files whose extensions are included in the
# BREBES-WAF upload extension whitelist.
#
# This rule logs allowed file upload extensions and is intended
# for auditing purposes. It does not enforce upload restrictions.
#
# Required Parameters:
#   MULTIPART_FILENAME = Uploaded filename
#
# Allowed Extensions:
#
#   Images:
#     - png
#     - jpg
#     - jpeg
#     - webp
#
#   Documents:
#     - pdf
#     - txt
#     - rtf
#     - doc
#     - docx
#     - odt
#
#   Spreadsheets:
#     - xls
#     - xlsx
#     - csv
#     - ods
#
#   Presentations:
#     - ppt
#     - pptx
#     - odp
# =============================================================================

SecRule MULTIPART_FILENAME "@rx \.(?i:(png|jpg|jpeg|webp|pdf|txt|rtf|doc|docx|odt|xls|xlsx|csv|ods|ppt|pptx|odp))$" \
"id:1001001,\
rev:'1',\
ver:'BREBES-WAF/1.0',\
phase:2,\
pass,\
log,\
auditlog,\
severity:'NOTICE',\
accuracy:'10',\
maturity:'10',\
tag:'brebes-waf',\
tag:'whitelist',\
tag:'upload',\
tag:'allowed-extension',\
logdata:'Matched %{MATCHED_VAR_NAME}=%{MATCHED_VAR}',\
msg:'BREBES-WAF | Whitelist | Allowed File Upload Extension'"
