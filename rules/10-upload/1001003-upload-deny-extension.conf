#
# =============================================================================
# BREBES-WAF
# Category  : Upload
# Function  : Block Disallowed File Extensions
# Version   : 1.0
# Author    : Brebes CSIRT
# Rule ID   : 1001003
#
# Description:
# Blocks uploaded files whose extensions are not included in the
# BREBES-WAF allowed upload extension whitelist.
#
# Required Parameters:
#   MULTIPART_FILENAME = Uploaded filename
#
# Allowed Extensions:
#   Images:
#     - png
#     - jpg
#     - jpeg
#     - webp
#
#   Documents:
#     - pdf
#     - txt
#     - rtf
#     - doc
#     - docx
#     - odt
#
#   Spreadsheets:
#     - xls
#     - xlsx
#     - csv
#     - ods
#
#   Presentations:
#     - ppt
#     - pptx
#     - odp
#
# Any uploaded file with an extension outside this whitelist
# will be denied with HTTP 403.
# =============================================================================

SecRule MULTIPART_FILENAME "@rx ." \
"id:1001003,\
rev:'1',\
ver:'BREBES-WAF/1.0',\
phase:2,\
deny,\
status:403,\
log,\
auditlog,\
severity:'CRITICAL',\
accuracy:'10',\
maturity:'10',\
tag:'brebes-waf',\
tag:'upload',\
tag:'blocked-extension',\
logdata:'Matched %{MATCHED_VAR_NAME}=%{MATCHED_VAR}',\
msg:'BREBES-WAF | Upload | Disallowed File Extension',\
chain"

    SecRule MULTIPART_FILENAME "!@rx \.(?i:(png|jpg|jpeg|webp|pdf|txt|rtf|doc|docx|odt|xls|xlsx|csv|ods|ppt|pptx|odp))$"